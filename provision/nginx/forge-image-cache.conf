# Image & asset caching for Laravel Forge
# ──────────────────────────────────────────
# Paste this inside your server {} block in Forge's
# "Edit Nginx Configuration" panel, BEFORE the
# existing `location / { ... }` block.
#
# Forge's default config already serves static files
# via try_files through the /storage symlink — this
# just adds cache headers to those responses.

# Cache images (cards, logos, symbols)
location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri $uri/ /index.php?$query_string;
}

# Cache fonts (game icon font)
location ~* \.(otf|ttf|woff|woff2|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri $uri/ /index.php?$query_string;
}

# Cache built JS/CSS assets (Vite hashes filenames, so immutable)
location ~* ^/build/.*\.(js|css)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri $uri/ /index.php?$query_string;
}
